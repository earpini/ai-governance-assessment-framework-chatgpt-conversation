# Monthly data collection for the Plures AI Ecosystem Explorer (v2 pipeline).
# Collects from GitHub's runners, rebuilds the snapshot, and opens a PR.
# NEVER publishes directly: a human reviews before anything goes live.
name: monthly-collect

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  collect-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SNAP: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute snapshot id and date range
        run: |
          echo "SNAP=$(date -u +%Y-%m)" >> "$GITHUB_ENV"
          echo "START=$(date -u -d '24 months ago' +%Y-%m-01)" >> "$GITHUB_ENV"
          echo "END=$(date -u +%Y-%m-01)" >> "$GITHUB_ENV"

      - name: Source health check
        run: python3 verify_sources.py
        continue-on-error: true

      - name: Collect OpenAlex (T1, T2)
        working-directory: pipeline/v2
        run: python3 collect_openalex.py "$SNAP"

      - name: Collect Wikimedia (A3)
        working-directory: pipeline/v2
        run: python3 collect_wikimedia.py "$SNAP" "$START" "$END"

      - name: Collect GDELT (A1)
        id: gdelt
        working-directory: pipeline/v2
        run: python3 collect_gdelt.py "$SNAP" 24
        continue-on-error: true
        timeout-minutes: 45

      - name: Build snapshot
        working-directory: pipeline/v2
        run: python3 build.py "$SNAP"

      - name: Open pull request with new snapshot
        uses: peter-evans/create-pull-request@v6
        with:
          branch: data/${{ env.SNAP }}
          commit-message: "data: automated monthly snapshot"
          title: "Monthly data snapshot ${{ env.SNAP }}"
          body: |
            Automated monthly collection (v2 pipeline).
            GDELT step outcome: ${{ steps.gdelt.outcome }}
            Raw responses: data/raw/ - Built: data/published/snapshot_v2.json
            Review before merging: collector logs, spot-check countries,
            tier changes vs previous snapshot must be explainable.
          add-paths: |
            data/raw/**
            data/published/**
